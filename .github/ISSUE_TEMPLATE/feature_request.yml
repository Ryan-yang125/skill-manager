name: Feature request
description: Suggest an improvement for Skill Manager.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      placeholder: What workflow should improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      placeholder: What should Skill Manager do?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      placeholder: Add examples, screenshots, or related tools.
